version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-cunghande}
      MYSQL_DATABASE: ${DB_NAME:-recommendation_db}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./data/database.sql:/docker-entrypoint-initdb.d/1_database.sql
      - ./data/migrate_v2.sql:/docker-entrypoint-initdb.d/2_migrate_v2.sql

  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-cunghande}
      - DB_NAME=${DB_NAME:-recommendation_db}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  db_data:
